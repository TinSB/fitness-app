name: IronPath CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    name: IronPath Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Dev API
        run: npm run api:dev:build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dist token scan
        shell: bash
        run: |
          if [ -d dist ]; then
            ! grep -R -F \
              -e "node:http" \
              -e "node:sqlite" \
              -e "devLauncher" \
              -e "httpRuntimeAdapter" \
              -e "serverAdapter" \
              -e "sqliteRepository" \
              -e "devApiRunner" \
              -e "devDbRecovery" \
              dist
          fi
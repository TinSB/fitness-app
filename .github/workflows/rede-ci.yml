name: Rede CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    name: Swift Validation
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      TZ: America/New_York

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: List Xcode project
        run: xcodebuild -list -project ios/Rede.xcodeproj

      - name: Swift package tests
        shell: bash
        run: |
          set -euo pipefail
          # Explicit test surface: a package silently vanishing must fail CI,
          # and a new package must be registered here before it counts as tested.
          EXPECTED_PACKAGES="RedeDataHealth RedeDomain RedeEntitlements RedeHealthKit RedeL10n RedeLocalSnapshot RedeNotifications RedePersistence RedeTrainingDecision RedeWidgetShared"
          for name in $EXPECTED_PACKAGES; do
            echo "== swift test: ios/packages/$name =="
            (cd "ios/packages/$name" && swift test)
          done
          for package in ios/packages/*/; do
            [ -d "$package" ] || continue
            name="$(basename "$package")"
            case " $EXPECTED_PACKAGES " in
              *" $name "*) ;;
              *) echo "::error::ios/packages/$name is not in EXPECTED_PACKAGES — register it in this workflow"; exit 1 ;;
            esac
          done

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ios/Rede.xcodeproj \
            -scheme Rede \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Verify production subscription fails closed
        shell: bash
        run: |
          set -euo pipefail
          REDE_SIMULATOR_ID="$(
            xcrun simctl list devices available |
              awk -F '[()]' '/iPhone/ && $2 ~ /^[0-9A-F-]+$/ { print $2; exit }'
          )"
          if [ -z "$REDE_SIMULATOR_ID" ]; then
            echo "::error::No available iPhone Simulator for RedeTests"
            exit 1
          fi
          xcodebuild \
            -project ios/Rede.xcodeproj \
            -scheme Rede \
            -destination "platform=iOS Simulator,id=$REDE_SIMULATOR_ID" \
            -only-testing:RedeTests/StoreKitEntitlementsTests/testProductionConfigurationFailsClosedWithoutApprovedProducts \
            test
